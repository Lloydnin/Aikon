<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aikon OS // Ultra Instinct</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aikon">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='glow' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='40%25' stop-color='%2300d2ff'/%3E%3Cstop offset='80%25' stop-color='%238a2be2'/%3E%3Cstop offset='100%25' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23glow)'/%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="clock-container">
            <div id="time">00:00:00</div>
            <div id="date">Aikon System Active</div>
        </div>
        <div class="aura-core-container">
            <div class="aura-core"></div>
        </div>
    </header>

    <div class="console">
        <div class="console-header">
            <span>AIKON CORE // ULTRA INSTINCT</span>
            <div class="system-status">
                <div class="status-dot"></div>
                <span>OFFLINE SECURE</span>
            </div>
        </div>
        
        <div class="feed" id="feed">
            <div class="message msg-aikon">
                Systems initialized. I am Aikon. Tap a suggestion below or type a custom command. Let's transcend limits.
            </div>
        </div>

        <div class="active-widgets" id="widget-area" style="display: none;"></div>
    </div>

    <div class="controls">
        <div class="suggestions">
            <span class="chip" onclick="fillCommand('Remind me to check the oven in 15 seconds')">⏱️ 15s Timer</span>
            <span class="chip" onclick="fillCommand('Note: Goku achieved UI at the Tournament of Power')">🧠 Memory</span>
            <span class="chip" onclick="fillCommand('Show my notes')">📝 Show Notes</span>
            <span class="chip" onclick="fillCommand('Calculate (150 + 50) / 2')">🧮 Calculate</span>
            <span class="chip" onclick="fillCommand('Tell me about Ultra Instinct')">🌌 UI Lore</span>
        </div>
        <div class="input-bar">
            <input type="text" id="input-cmd" placeholder="Command Aikon..." autocomplete="off">
            <button id="btn-send">➔</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
